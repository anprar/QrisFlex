<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QrisFlex Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f4efe3, #e8e0cf);
        color: #10211b;
        font-family: Manrope, Arial, sans-serif;
      }
      main {
        max-width: 560px;
        padding: 32px;
        border-radius: 32px;
        background: rgba(255, 250, 241, 0.82);
        box-shadow: 0 24px 80px rgba(20, 46, 38, 0.14);
        text-align: center;
      }
      a {
        color: #0e9f6e;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Anda sedang offline</h1>
      <p>QrisFlex tetap bisa decode dan generate QRIS secara lokal. Setelah koneksi kembali, antrean riwayat akan disinkronkan otomatis.</p>
      <p><a href="/">Kembali ke landing page</a></p>
    </main>
  </body>
</html>
